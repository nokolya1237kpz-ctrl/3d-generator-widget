<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Генератор 3D-моделей для печати">
    <meta name="theme-color" content="#5c8db6">
    <title>📐 3D Генератор моделей</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <!-- ✅ Three.js (глобальные скрипты) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.min.js"></script>
    
    <link rel="icon" href="image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📐</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <h1>📐 3D Генератор</h1>
            <p class="subtitle">Создайте модель по параметрам</p>
        </header>

        <div class="card">
            <label for="model-type" class="input-label">Выберите модель</label>
            <select id="model-type" class="select-box">
                <option value="box">📦 Коробка с защёлкой</option>
                <option value="lid">📦 Крышка для коробки</option>
                <option value="gear">⚙️ Шестерня с зубьями</option>
                <option value="washer">🔩 Шайба / кольцо</option>
                <option value="organizer">🗄️ Органайзер с секциями</option>
                <option value="round-box">⚫ Круглая коробка</option>
                <option value="round-lid">🔵 Крышка для круглой</option>
            </select>

            <div id="params-container" class="params-grid"></div>

            <button id="generate-btn" class="btn-primary">
                🚀 Сгенерировать STL
            </button>
        </div>

        <!-- ✅ 3D Preview с ЯВНЫМИ размерами -->
        <div id="preview-container" style="width:100%; height:260px; min-height:260px; border-radius:14px; overflow:hidden; display:none; margin-bottom:12px; background:#f4f6f8; touch-action:none; position:relative;"></div>
        <button id="screenshot-btn" class="btn-screenshot" style="display:none; width:100%; margin-bottom:12px;">📸 Сохранить скриншот</button>

        <div id="status-area" class="status hidden" role="status" aria-live="polite"></div>

        <div id="result-area" class="card result-card hidden">
            <div class="success-icon" aria-hidden="true">✅</div>
            <h3>Модель готова!</h3>
            <p class="result-text">Файл готов к скачиванию и печати</p>
            <a id="download-link" href="#" class="btn-download" download>
                💾 Скачать STL
            </a>
            <small>Откройте файл в слайсере (Cura, PrusaSlicer) для подготовки к печати</small>
        </div>
        
        <a href="../" class="back-link">🔙 Вернуться в меню</a>
    </div>

    <script src="script.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof vkBridge !== 'undefined') {
                vkBridge.send('VKWebAppSetViewSettings', {
                    status_bar_style: 'light',
                    action_bar_color: '#5c8db6'
                }).catch(function(e) {
                    // Игнорируем ошибку unsupported platform
                });
            }
        });
    </script>
</body>
</html>
